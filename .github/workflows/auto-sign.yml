name: Mir3G Auto Sign
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  sign-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Auto Sign
        env:
          GAME_ACCOUNT: ${{ secrets.GAME_ACCOUNT }}
          ROLE_NAME: ${{ secrets.ROLE_NAME }}
        run: python sign.py
