# 工作流名称：传奇3G自动签到+Server酱推送
name: Mir3G Auto Sign With ServerChan
# 触发条件：1.定时触发 2.手动触发（方便测试）
on:
  schedule:
    # 定时运行（UTC时间，北京时间=UTC+8，示例：北京时间7点→UTC23点, UTC15→北京时间23点）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 手动触发：仓库→Actions→选择此工作流→Run workflow

# 运行作业
jobs:
  sign-job:
    runs-on: ubuntu-latest  # GitHub免费Ubuntu环境
    steps:
      # 步骤1：拉取仓库代码到虚拟机
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步骤2：配置Python3.11环境
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤3：安装依赖（requests+beautifulsoup4）
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 步骤4：运行签到脚本，传入所有Secrets环境变量
      - name: Run Auto Sign Script
        env:
          GAME_ACCOUNT: ${{ secrets.GAME_ACCOUNT }}
          ROLE_NAME: ${{ secrets.ROLE_NAME }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}  # Server酱密钥
        run: python sign.py
