# 工作流名称：传奇3G自动签到
name: Mir3G Auto Sign
# 触发条件：1.定时触发 2.手动触发（方便测试）
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  sign-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 这里已经删除了 cache: 'pip' ✅

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Auto Sign Script
        env:
          GAME_ACCOUNT: ${{ secrets.GAME_ACCOUNT }}
          ROLE_NAME: ${{ secrets.ROLE_NAME }}
        run: python sign.py
